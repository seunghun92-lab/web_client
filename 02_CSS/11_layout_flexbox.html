<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS | Layout - Flexbox</title>
  <link rel="stylesheet" href="css/11_layout_flexbox.css">
</head>

<body>
  <h1>Flexbox</h1>
  <!-- @실습문제: https://flexboxfroggy.com/ -->
  <!-- 
    flexbox (메인축/크로스축)
    grid (행열)

    부모요소 flex-container
      - display: flex | inline-flex
      - flex-direction: row(기본값) | column
      - justify-content: 메인축설정 flex-start(기본값) | center | flex-end | space-between | space-around | space-evenly
      - align-items : 크로스축설정 stretch(기본값) | baseline | center | flex-start | flex-end
      - flex-wrap: 줄바끔여부 nowrap(기본값) | wrap
      - align-content: wrap속성이 지정된 여러축인 존재할때 적용.
    자식요소 flex-item
      - flex-basis: 기준 크기로 120 px을 확보한다. 
      - flex-grow: 컨테이너에 여유 공간이 남으면 1 비율만큼 늘어난다.
      - flex-shrink: 공간이 모자라면 1 비율만큼 줄어든다.
      - align-self: 특정 자식요소에만 적용되는 속성.
  -->
  <div class="container">
    <div class="item">1</div>
    <div class="item order-first">2 (order -1)</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
  </div>

</body>

</html>
