<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border: 1px solid #000;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #000;
            padding: 5px;
        }

        .on {
            background-color: tomato;
            color: #fff;
        }
    </style>
</head>

<body>
    <h1>CSS Styling</h1>

    <h2 id="first" onmouseover="test1();">inline-style</h2>

    <h2>class property</h2>
    <table>
        <thead>
            <tr>
                <th colspan="5">
                    <h3>🚎수강신청🚎</h3>
                </th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    <label for="subject1">국어</label>
                    <!-- this용법: DOM태그객체의 on이벤트속성에서 작성된 this는 현재 태그객체를 가리킨다. -->
                    <input type="checkbox" name="subject" id="subject1" value="국어" onchange="checkSubject(this)">
                </td>
                <td>
                    <label for="subject2">영어</label>
                    <input type="checkbox" name="subject" id="subject2" value="영어" onchange="checkSubject(this)">
                </td>
                <td>
                    <label for="subject3">수학</label>
                    <input type="checkbox" name="subject" id="subject3" value="수학" onchange="checkSubject(this)">
                </td>
                <td>
                    <label for="subject4">사회</label>
                    <input type="checkbox" name="subject" id="subject4" value="사회" onchange="checkSubject(this)">
                </td>
                <td>
                    <label for="subject5">과학</label>
                    <input type="checkbox" name="subject" id="subject5" value="과학" onchange="checkSubject(this)">
                </td>
            </tr>
        </tbody>
    </table>
    <script src="js/04_css_styling.js"></script>
</body>

</html>
