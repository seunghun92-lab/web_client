<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .bubble {
            border: 1px solid #000;
            padding: 20px;
            margin: 5px 0;
        }

        .bubble1 {
            background-color: lightblue;
        }

        .bubble2 {
            background-color: lightcoral;
        }

        .bubble3 {
            background-color: lightgreen;
        }
    </style>
    <script>
        // DOMContentLoaded 이벤트는 DOM Tree완성후 발생!
        window.onload = (e) => {
            console.log('window loaded!');
        };
        window.addEventListener('load', () => {
            const $h1 = document.querySelector('h1');
            console.log($h1);
        });
        console.log('🍓🍓🍓');

    </script>
</head>

<body onload="console.log('body loaded!');">
    <h1>Event</h1>
    <!-- 
        Event란? 웹페이지상의 모든 사용자액션, 네트워크처리 등 이벤트형태로 관리를 한다. 
        (Event-driven Programming) 각 이벤트별 핸들러(리스너)함수를 작성하고 자동으로 트리거 되도록 한다.
        이벤트발생시 이벤트관련정보를 객체로 생성해서 핸들러의 첫번째 전달함.
    -->
    <!-- button#btn1[onclick] -->
    <button id="btn1" onclick="test1(event);">inline-이벤트속성</button>
    <button id="btn2">이벤트속성</button>
    <button id="btn3">addEventListener</button>

    <fieldset>
        <legend>input관련</legend>
        <input type="text" id="nickname" placeholder="닉네임을 입력하세요...">
        <br>
        <input type="text" id="memo" placeholder="메모를 입력하세요...">
    </fieldset>

    <form name="signupFrm" action="javascript:requestSignup();">
        <fieldset>
            <legend>회원가입</legend>
            <div>
                <label for="username">아이디</label>
                <input type="text" name="username" id="username" required>
            </div>
            <div>
                <label for="password">비밀번호</label>
                <input type="password" name="password" id="password" required>
            </div>
            <div>
                <label for="confirm-password">비밀번호 확인</label>
                <input type="password" id="confirm-password" required>
            </div>
            <div>
                <button>등록</button>
                <button type="reset">초기화</button>
            </div>
        </fieldset>
    </form>

    <h2>Event Propagation</h2>
    <div id="bubble1" class="bubble bubble1">
        <div id="bubble2" class="bubble bubble2">
            <div id="bubble3" class="bubble bubble3">Event Propagation - Bubbling</div>
        </div>
    </div>
    <script src="js/08_event.js"></script>
</body>

</html>
