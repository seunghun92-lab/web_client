<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML | inline/block</title>
</head>

<body>
  <h1>inline/block</h1>
  <!-- inline요소 -->
  <!-- block요소 -->

  <!-- 아래와 같이 표시되는 이유 설명하기 -->
  <h2>inline</h2>
  <span style="background-color: coral;">하나</span>
  <span style="background-color: coral;">둘</span>
  <span style="background-color: coral;">셋</span>

  <h2>block</h2>
  <div style="background-color: lightblue;">하나</div>
  <div style="background-color: aquamarine;">둘</div>
  <div style="background-color: blueviolet;">셋</div>

</body>

</html>
