<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML | iframe</title>
</head>

<body>
  <h1>iframe</h1>
  <!-- 
    페이지내에 다른 페이지를 포함해서 출력
  -->
  <iframe src="./" frameborder="0" width="100%"></iframe>

  <iframe src="05_table.html" frameborder="1" width="100%" height="300px"></iframe>

  <!-- 유투브 영상 삽입 구현: 유투브 영상 공유섹션 사용 -->
  <iframe width="560" height="315" src="https://www.youtube.com/embed/BvMqypgaR9Y?si=qDdiXu7L1TYEnEeA"
    title="YouTube video player" frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

</body>

</html>
